<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTrack - Student Productivity Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📚 StudyTrack</h1>
                <button class="theme-toggle" id="themeToggle">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingTasks">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
            </section>

            <!-- Add Task Section -->
            <section class="add-task-section">
                <h2>Add Homework Task</h2>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="taskTitle" 
                            placeholder="Task title (e.g., Math Homework)" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <textarea 
                            id="taskDescription" 
                            placeholder="Task description (optional)"
                            rows="3"
                        ></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskDeadline">Deadline:</label>
                            <input type="datetime-local" id="taskDeadline" required>
                        </div>
                        <div class="form-group">
                            <label for="taskPriority">Priority:</label>
                            <select id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
            </section>

            <!-- Filters Section -->
            <section class="filters-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="overdue">Overdue</button>
            </section>

            <!-- Tasks List Section -->
            <section class="tasks-section">
                <h2>Your Tasks</h2>
                <div id="tasksContainer" class="tasks-container">
                    <div class="empty-state">
                        <p>No tasks yet. Add one to get started! 🎯</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 StudyTrack. Stay productive! 📚</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
